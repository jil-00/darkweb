services:
  mongodb:
    image: mongo:7
    container_name: threat-intel-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: threat-intel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: threat-intel-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis

  celery-worker:
    build:
      context: ./backend
    container_name: threat-intel-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: threat-intel-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: threat-intel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data: